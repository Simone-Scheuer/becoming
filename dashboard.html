<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Becoming — Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); padding: 24px; font-size: 13px; line-height: 1.5; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  h2 { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .meta { color: var(--muted); font-size: 12px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .full { grid-column: 1 / -1; }

  /* Habits */
  .habit { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .habit-label { flex: 1; min-width: 0; }
  .habit-name { font-size: 13px; }
  .habit-goal { font-size: 11px; color: var(--muted); }
  .habit-bar { width: 120px; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
  .habit-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .habit-count { font-size: 12px; color: var(--muted); width: 36px; text-align: right; flex-shrink: 0; }

  /* Tasks */
  .task { padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .task:last-child { border-bottom: none; }
  .task-text { flex: 1; }
  .task-meta { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
  .tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 500; }
  .tag-goal { background: #1f2a37; color: var(--accent); }
  .tag-due { background: #2a1f1f; color: var(--red); }
  .tag-rolling { background: #2a2a1f; color: var(--yellow); }
  .tag-waiting { background: #1f2a2a; color: var(--purple); }

  /* Today */
  .today-item { padding: 4px 0; display: flex; gap: 8px; }
  .today-item.done { color: var(--muted); text-decoration: line-through; }
  .check { width: 16px; flex-shrink: 0; }

  /* Deadlines */
  .deadline { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .deadline:last-child { border-bottom: none; }
  .days-left { font-weight: 600; }
  .days-urgent { color: var(--red); }
  .days-soon { color: var(--yellow); }
  .days-ok { color: var(--green); }

  .empty { color: var(--muted); font-style: italic; }
  .refresh { color: var(--muted); font-size: 11px; }
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Becoming</h1>
    <div class="meta" id="timestamp"></div>
  </div>
  <div class="refresh" id="refresh-info"></div>
</div>

<div class="grid">
  <div class="card">
    <h2>Habits This Week</h2>
    <div id="habits"></div>
  </div>

  <div class="card">
    <h2>Today</h2>
    <div id="today"></div>
  </div>

  <div class="card">
    <h2>Deadlines</h2>
    <div id="deadlines"></div>
  </div>

  <div class="card">
    <h2>Docket</h2>
    <div id="docket"></div>
  </div>
</div>

<script>
async function load(path) {
  const r = await fetch(path + '?t=' + Date.now());
  if (!r.ok) return null;
  return r.text();
}

async function loadJSON(path) {
  const t = await load(path);
  return t ? JSON.parse(t) : null;
}

function renderHabits(data) {
  const el = document.getElementById('habits');
  if (!data || !data.habits.length) { el.innerHTML = '<div class="empty">No habits yet — add them during /checkin weekly</div>'; return; }
  el.innerHTML = data.habits.map(h => {
    const pct = Math.min(100, (h.current / h.target) * 100);
    const color = pct >= 100 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="habit">
      <div class="habit-label">
        <div class="habit-name">${h.text}</div>
        <div class="habit-goal">${h.goal || 'personal'}</div>
      </div>
      <div class="habit-bar"><div class="habit-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="habit-count">${h.current}/${h.target}</div>
    </div>`;
  }).join('');
}

function renderDocket(data) {
  const el = document.getElementById('docket');
  if (!data || !data.tasks.length) { el.innerHTML = '<div class="empty">Docket empty — seed it during /setup</div>'; return; }

  const tasks = data.tasks
    .filter(t => t.status !== 'done')
    .sort((a, b) => {
      if (a.due && !b.due) return -1;
      if (!a.due && b.due) return 1;
      if (a.due && b.due) return a.due.localeCompare(b.due);
      return (b.days_rolling || 0) - (a.days_rolling || 0);
    });

  el.innerHTML = tasks.map(t => {
    const tags = [];
    if (t.goal) tags.push(`<span class="tag tag-goal">${t.goal}</span>`);
    if (t.due) {
      const days = Math.ceil((new Date(t.due) - new Date()) / 86400000);
      tags.push(`<span class="tag tag-due">${days <= 0 ? 'TODAY' : days + 'd'}</span>`);
    }
    if (t.days_rolling >= 5) tags.push(`<span class="tag tag-rolling">day ${t.days_rolling}</span>`);
    else if (t.days_rolling >= 3) tags.push(`<span class="tag tag-rolling">day ${t.days_rolling}</span>`);
    if (t.status === 'waiting') tags.push(`<span class="tag tag-waiting">waiting</span>`);
    return `<div class="task">
      <div class="task-text">${t.text}</div>
      <div class="task-meta">${tags.join('')}</div>
    </div>`;
  }).join('');
}

function renderToday(weekText) {
  const el = document.getElementById('today');
  if (!weekText) { el.innerHTML = '<div class="empty">No weekly plan yet</div>'; return; }

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const todayName = days[new Date().getDay()];
  const todayShort = todayName.slice(0, 3);

  const lines = weekText.split('\n');
  let inToday = false;
  const items = [];

  for (const line of lines) {
    if (line.match(/^###\s/)) {
      if (inToday) break;
      if (line.toLowerCase().includes(todayShort.toLowerCase()) || line.includes('TODAY')) {
        inToday = true;
      }
      continue;
    }
    if (inToday && line.match(/^- \[[ x]\]/)) {
      const done = line.includes('[x]');
      const text = line.replace(/^- \[[ x]\]\s*/, '');
      items.push({ text, done });
    }
  }

  if (!items.length) { el.innerHTML = '<div class="empty">Nothing scheduled today</div>'; return; }
  el.innerHTML = items.map(i =>
    `<div class="today-item ${i.done ? 'done' : ''}">
      <span class="check">${i.done ? '\u2713' : '\u25CB'}</span>
      <span>${i.text}</span>
    </div>`
  ).join('');
}

function renderDeadlines(docket, weekText) {
  const el = document.getElementById('deadlines');
  const items = [];
  const now = new Date();

  if (docket && docket.tasks) {
    docket.tasks.forEach(t => {
      if (t.due && t.status !== 'done') {
        const days = Math.ceil((new Date(t.due) - now) / 86400000);
        items.push({ text: t.text, due: t.due, days });
      }
    });
  }

  items.sort((a, b) => a.days - b.days);

  if (!items.length) { el.innerHTML = '<div class="empty">No deadlines</div>'; return; }
  el.innerHTML = items.map(i => {
    const cls = i.days <= 1 ? 'days-urgent' : i.days <= 3 ? 'days-soon' : 'days-ok';
    const label = i.days <= 0 ? 'TODAY' : i.days === 1 ? 'tomorrow' : `${i.days} days`;
    return `<div class="deadline">
      <span>${i.text}</span>
      <span class="days-left ${cls}">${label}</span>
    </div>`;
  }).join('');
}

async function refresh() {
  const now2 = new Date();
  const mon = new Date(now2);
  mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
  const weekFile = `weeks/${mon.toISOString().slice(0, 10)}.md`;

  const [habits, docket, weekText] = await Promise.all([
    loadJSON('data/habits.json'),
    loadJSON('data/docket.json'),
    load(weekFile)
  ]);

  renderHabits(habits);
  renderDocket(docket);
  renderToday(weekText);
  renderDeadlines(docket, weekText);

  const now = new Date();
  document.getElementById('timestamp').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) +
    ' \u00B7 ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  document.getElementById('refresh-info').textContent = 'auto-refreshes every 30s';
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
